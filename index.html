<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Planning HIS – CGT GISO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="theme-color" content="#05060b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="pk-header">
    <div class="pk-header-top">
      <div class="pk-header-title">
        <h1>PLANNING HIS CGT GISO</h1>
        <p>IP / GISO</p>
      </div>
      <nav class="pk-module-tabs" aria-label="Modules">
        <button id="tabHis" type="button" class="pk-tab pk-tab--active">Planning HIS</button>
        <button id="tabElections" type="button" class="pk-tab">Planning élections</button>
      </nav>
    </div>
    <div id="hisHeaderFilters" class="pk-header-filters">
      <!-- Menu de sélection hiérarchique compact -->
      <div class="pk-dropdown-menu">
        <div id="dropdownMenu" class="pk-dropdown-content pk-dropdown-hidden">
          <!-- rempli par JS -->
        </div>
      </div>
      <select id="colleagueSelect" class="pk-select">
        <!-- rempli par JS -->
      </select>

      <div class="pk-month-nav">
        <button id="prevMonth" class="pk-btn pk-btn-ghost">◀</button>
        <span id="currentMonthLabel"></span>
        <button id="nextMonth" class="pk-btn pk-btn-ghost">▶</button>
      </div>
    </div>
    <div id="electionsHeaderFilters" class="pk-header-filters pk-module-hidden">
      <div class="pk-month-nav">
        <button id="electionsPrevMonth" type="button" class="pk-btn pk-btn-ghost">◀</button>
        <span id="electionsMonthLabel"></span>
        <button id="electionsNextMonth" type="button" class="pk-btn pk-btn-ghost">▶</button>
      </div>
    </div>
  </header>

  <main id="hisModule" class="pk-main">
    <section class="pk-panel">
      <div class="pk-panel-header">
        <h2 class="pk-panel-title">Mois en cours</h2>
        <button id="addSlotBtn" class="pk-btn pk-btn-add-slot">+ Ajouter un créneau</button>
      </div>
      <div id="calendar" class="pk-calendar">
        <!-- calendrier généré par JS -->
      </div>
    </section>
  </main>

  <main id="electionsModule" class="pk-main pk-module-hidden">
    <section class="pk-panel">
      <div class="pk-panel-header">
        <h2 class="pk-panel-title">Présences élections</h2>
        <div class="pk-panel-actions">
          <button id="electionsGenerateMonthBtn" type="button" class="pk-btn pk-btn-ghost">⚡ Générer le mois</button>
          <button id="electionsAddBtn" type="button" class="pk-btn pk-btn-add-slot">+ Ajouter</button>
        </div>
      </div>
      <div id="electionsList" class="pk-elections-list">
        <!-- rempli par JS -->
      </div>
    </section>
  </main>

  <!-- Boutons en bas de page -->
  <footer id="hisFooter" class="pk-footer">
    <div class="pk-footer-grid">
      <button id="showAddressesBtn" class="pk-btn pk-btn-footer">📍 Adresses</button>
      <button id="showHistoryBtn" class="pk-btn pk-btn-footer">📋 Historique</button>
      <button id="showInactiveSlotsBtn" class="pk-btn pk-btn-footer pk-btn-footer-split">
        <span>Créneaux non planifiés</span>
        <span class="pk-btn-footer-sub">(2 mois)</span>
      </button>
      <button id="showTopBtn" class="pk-btn pk-btn-footer">🏆 Top HIS</button>
    </div>
  </footer>

  <footer id="electionsFooter" class="pk-footer pk-module-hidden">
    <div class="pk-footer-grid">
      <button id="electionsUncoveredBtn" type="button" class="pk-btn pk-btn-footer">⚠️ Non couverts</button>
      <button id="electionsCopyBtn" type="button" class="pk-btn pk-btn-footer">📋 Copier planning</button>
      <button id="electionsCopyUncoveredBtn" type="button" class="pk-btn pk-btn-footer pk-btn-footer-split">
        <span>Copier non couverts</span>
        <span class="pk-btn-footer-sub">WhatsApp</span>
      </button>
    </div>
  </footer>

  <!-- Modale présence élections (ajout / modification) -->
  <div id="electionsFormModal" class="pk-modal pk-modal-hidden">
    <div class="pk-modal-content pk-modal-add-slot pk-modal-elections-form">
      <div class="pk-modal-header">
        <h3 id="electionsFormTitle">Ajouter une présence</h3>
        <button id="closeElectionsFormModal" type="button" class="pk-btn pk-btn-ghost">✕</button>
      </div>
      <div class="pk-modal-form-scroll">
        <div class="pk-modal-form">
          <div class="pk-form-group">
            <label for="electionFormDate" class="pk-form-label">Date :</label>
            <input type="date" id="electionFormDate" class="pk-select pk-form-input" required>
          </div>
          <div class="pk-form-group">
            <label for="electionFormMainId" class="pk-form-label">Site :</label>
            <select id="electionFormMainId" class="pk-select pk-form-input" required></select>
          </div>
          <div class="pk-form-group">
            <label for="electionFormSubId" class="pk-form-label">Sous-site :</label>
            <select id="electionFormSubId" class="pk-select pk-form-input" required></select>
          </div>
          <div class="pk-form-group">
            <label for="electionFormType" class="pk-form-label">Type :</label>
            <select id="electionFormType" class="pk-select pk-form-input" required></select>
          </div>
          <div class="pk-form-group">
            <label for="electionFormCreneau" class="pk-form-label">Créneau :</label>
            <select id="electionFormCreneau" class="pk-select pk-form-input" required></select>
          </div>
          <div class="pk-form-group">
            <label for="electionFormAgent1" class="pk-form-label">Agent 1 :</label>
            <select id="electionFormAgent1" class="pk-select pk-form-input"></select>
          </div>
          <div class="pk-form-group">
            <label for="electionFormAgent2" class="pk-form-label">Agent 2 :</label>
            <select id="electionFormAgent2" class="pk-select pk-form-input"></select>
          </div>
          <div class="pk-form-group">
            <label for="electionFormStatus" class="pk-form-label">Statut :</label>
            <select id="electionFormStatus" class="pk-select pk-form-input" required></select>
          </div>
          <div class="pk-form-group">
            <label for="electionFormComment" class="pk-form-label">Commentaire :</label>
            <input type="text" id="electionFormComment" class="pk-select pk-form-input" placeholder="Optionnel">
          </div>
        </div>
      </div>
      <div class="pk-modal-footer">
        <button id="saveElectionPresence" type="button" class="pk-btn">Enregistrer</button>
        <button id="cancelElectionPresence" type="button" class="pk-btn pk-btn-ghost">Annuler</button>
      </div>
    </div>
  </div>

  <!-- Modale créneaux élections non couverts -->
  <div id="electionsUncoveredModal" class="pk-modal pk-modal-hidden">
    <div class="pk-modal-content pk-modal-scrollable">
      <div class="pk-modal-header">
        <h2>Créneaux élections non couverts</h2>
        <button id="closeElectionsUncoveredModal" type="button" class="pk-btn pk-btn-ghost">✕</button>
      </div>
      <div id="electionsUncoveredContainer" class="pk-elections-uncovered-list">
        <!-- rempli par JS -->
      </div>
    </div>
  </div>

  <!-- Modale Top HIS -->
  <div id="topModal" class="pk-modal pk-modal-hidden">
    <div class="pk-modal-content pk-modal-scrollable">
      <div class="pk-modal-header">
        <h2>Top HIS</h2>
        <button id="closeTopModal" class="pk-btn pk-btn-ghost">✕</button>
      </div>
      <div id="topContainer" class="pk-top-list">
        <!-- rempli par JS -->
      </div>
    </div>
  </div>

  <!-- Modale adresses des attachements -->
  <div id="addressesModal" class="pk-modal pk-modal-hidden">
    <div class="pk-modal-content pk-modal-scrollable">
      <div class="pk-modal-header">
        <h2>Adresses des attachements</h2>
        <button id="closeAddressesModal" class="pk-btn pk-btn-ghost">✕</button>
      </div>
      <div id="addressesContainer" class="pk-addresses-list">
        <!-- rempli par JS -->
      </div>
    </div>
  </div>

  <!-- Modale historique des créneaux -->
  <div id="historyModal" class="pk-modal pk-modal-hidden">
    <div class="pk-modal-content pk-modal-scrollable">
      <div class="pk-modal-header">
        <h2>Historique des créneaux</h2>
        <button id="closeHistoryModal" class="pk-btn pk-btn-ghost">✕</button>
      </div>
      <div id="historyContainer" class="pk-history-list">
        <!-- rempli par JS -->
      </div>
    </div>
  </div>

  <!-- Modale combinaisons inactives -->
  <div id="inactiveSlotsModal" class="pk-modal pk-modal-hidden">
    <div class="pk-modal-content pk-modal-scrollable">
      <div class="pk-modal-header">
        <h2>Combinaisons sans HIS sur les 2 derniers mois</h2>
        <button id="closeInactiveSlotsModal" class="pk-btn pk-btn-ghost">✕</button>
      </div>
      <div id="inactiveSlotsContainer" class="pk-inactive-slots-list">
        <!-- rempli par JS -->
      </div>
    </div>
  </div>

  <!-- Modale détail d'un jour -->
  <div id="dayModal" class="pk-modal pk-modal-hidden">
    <div class="pk-modal-content">
      <div class="pk-modal-header">
        <h3 id="dayModalTitle"></h3>
        <button id="closeDayModal" class="pk-btn pk-btn-ghost">✕</button>
      </div>
      <div id="daySlotsContainer" class="pk-slots-list">
        <!-- slots du jour -->
      </div>
      <div class="pk-modal-footer">
        <button id="addSlotInDayModal" class="pk-btn pk-btn-full">+ Ajouter une HIS pour ce jour</button>
        <button id="closeDayModalBottom" class="pk-btn pk-btn-ghost">Sortir</button>
      </div>
    </div>
  </div>

  <!-- Modale ajouter un créneau -->
  <div id="addSlotModal" class="pk-modal pk-modal-hidden">
    <div class="pk-modal-content pk-modal-add-slot">
      <div class="pk-modal-header">
        <h3>Ajouter un créneau HIS</h3>
        <button id="closeAddSlotModal" class="pk-btn pk-btn-ghost">✕</button>
      </div>
      <div class="pk-modal-form">
        <div class="pk-form-group">
          <label for="newSlotDate" class="pk-form-label">Date :</label>
          <input type="date" id="newSlotDate" class="pk-select pk-form-input" required>
          <div id="miniCalendar" class="pk-mini-calendar pk-mini-calendar-hidden"></div>
        </div>
        <div class="pk-form-group">
          <label for="newSlotMainId" class="pk-form-label">Site (A) :</label>
          <select id="newSlotMainId" class="pk-select pk-form-input" required>
            <!-- rempli par JS -->
          </select>
        </div>
        <div class="pk-form-group">
          <label for="newSlotSubId" class="pk-form-label">Sous-site (B) :</label>
          <select id="newSlotSubId" class="pk-select pk-form-input" required>
            <!-- rempli par JS -->
          </select>
        </div>
        <div class="pk-form-group">
          <label for="newSlotType" class="pk-form-label">Type (C) :</label>
          <select id="newSlotType" class="pk-select pk-form-input" required>
            <!-- rempli par JS -->
          </select>
        </div>
        <div class="pk-form-group">
          <label for="newSlotMaxPlaces" class="pk-form-label">Nombre de places max :</label>
          <input type="number" id="newSlotMaxPlaces" class="pk-select pk-form-input" min="1" value="3" required>
        </div>
        <div class="pk-form-group">
          <label for="newSlotLabel" class="pk-form-label">Commentaire (optionnel) :</label>
          <input type="text" id="newSlotLabel" class="pk-select pk-form-input" placeholder="Ex: remplacement, renfort, consigne...">
        </div>
        <div class="pk-modal-footer">
          <button id="saveSlot" class="pk-btn">Ajouter</button>
          <button id="cancelAddSlot" class="pk-btn pk-btn-ghost">Annuler</button>
        </div>
      </div>
    </div>
  </div>

  <!-- *** TRÈS IMPORTANT : chargement du JS *** -->
  <!-- Supabase doit être chargé avant app.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
